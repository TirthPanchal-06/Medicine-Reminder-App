name: medicine_reminder
description: A modern Smart Medicine Reminder App with offline capability, OCR prescription scanning, AI chatbot, and compliance charts.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  http: ^1.2.1
  http_parser: ^4.0.2
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  fl_chart: ^0.68.0
  intl: ^0.19.0
  image_picker: ^1.1.1
  file_picker: ^8.0.3
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.2
  flutter_timezone: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  # Add assets section for sample images or placeholder vectors if needed
  assets:
    - assets/
