services:
  - type: web
    name: medicine-reminder-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && mkdir -p uploads
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set this in Render dashboard from MongoDB Atlas
      - key: JWT_SECRET
        sync: false   # Set this in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # Optional - Set in Render dashboard for AI features
    healthCheckPath: /health
    autoDeploy: true
